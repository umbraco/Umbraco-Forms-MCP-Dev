# Cloudflare Worker Configuration for Hosted Umbraco Forms MCP Server
#
# Setup:
# 1. Create KV namespace: npx wrangler kv namespace create OAUTH_KV
# 2. Set secrets:
#    npx wrangler secret put UMBRACO_BASE_URL
#    npx wrangler secret put UMBRACO_OAUTH_CLIENT_ID
#    npx wrangler secret put COOKIE_ENCRYPTION_KEY
# 3. Deploy: npx wrangler deploy
#
# Local dev: npx wrangler dev
# (Create .dev.vars with secrets for local development)

name = "umbraco-forms-mcp"
main = "src/worker.ts"
compatibility_date = "2025-02-24"
compatibility_flags = ["nodejs_compat"]

# Alias Node.js-only modules that are pulled in transitively
# but not used at runtime (yargs uses createRequire at init time).
[alias]
"yargs" = "./src/stubs/empty.js"
"yargs/helpers" = "./src/stubs/empty.js"

# KV Namespaces for token storage
# Run: npx wrangler kv namespace create OAUTH_KV
# Then replace the id below with the output
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "YOUR_KV_NAMESPACE_ID"

# Durable Objects for stateful MCP sessions
[durable_objects]
bindings = [
  { name = "MCP_AGENT", class_name = "UmbracoFormsMcpAgent" }
]

# Durable Object migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["UmbracoFormsMcpAgent"]

# Environment variables (non-secret)
# Secrets should be set via `npx wrangler secret put` or .dev.vars file
[vars]
# UMBRACO_TOOL_MODES = "form-design,submissions"
# UMBRACO_INCLUDE_SLICES = ""
# UMBRACO_EXCLUDE_SLICES = ""
# UMBRACO_READONLY = "false"
